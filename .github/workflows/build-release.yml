name: Build & Release

# On pushing a tag like v1.2.3, build the standalone Windows EXE and
# create (or update) a GitHub Release with the EXE attached.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download ffmpeg & ffprobe
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $url = 'https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip'
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip -UseBasicParsing
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_bin -Force
          Copy-Item 'ffmpeg_bin/ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe' 'ffmpeg.exe' -Force
          Copy-Item 'ffmpeg_bin/ffmpeg-master-latest-win64-gpl/bin/ffprobe.exe' 'ffprobe.exe' -Force

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --windowed --onefile --icon ico.ico --name ogg_to_mp3 `
            --collect-all tkinterdnd2 --collect-all imageio_ffmpeg --collect-all pydub `
            --add-binary "ffmpeg.exe;." --add-binary "ffprobe.exe;." ogg_to_mp3.py

      - name: Upload EXE as release asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          gh release create "$tag" --title "EasyConvert $tag" `
            --notes "Release $tag. Download ogg_to_mp3.exe below." `
            --verify-tag "dist/ogg_to_mp3.exe"
